<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newtonian Tuition Centre | Excellence in Education</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f8f8f4;
    --green: #2d6a35;
    --green-mid: #3a8a44;
    --green-light: #4caf58;
    --green-pale: #e8f5ea;
    --green-dark: #1a3a1f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--black); color: var(--white); overflow-x: hidden; }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(248,248,244,0.97);
    backdrop-filter: blur(12px);
    padding: 0 5%;
    display: flex; align-items: center; justify-content: space-between;
    height: 72px;
    border-bottom: 1px solid rgba(0,0,0,0.08);
  }

  .logo img {
    height: 48px;
    width: auto;
    display: block;
  }

  .nav-links {
    display: flex; gap: 2.5rem; list-style: none;
  }

  .nav-links a {
    color: rgba(10,10,10,0.7);
    text-decoration: none;
    font-size: 0.875rem;
    font-weight: 500;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--green); }

  .nav-right {
    display: flex; align-items: center; gap: 1rem;
  }

  .nav-signin {
    color: var(--black) !important;
    border: 2px solid var(--black);
    padding: 0.45rem 1.25rem;
    border-radius: 4px;
    font-size: 0.8rem !important;
    font-weight: 600 !important;
    letter-spacing: 1px !important;
    transition: all 0.2s !important;
  }

  .nav-signin:hover {
    background: var(--black) !important;
    color: var(--white) !important;
  }

  .nav-cta {
    background: var(--green) !important;
    color: var(--white) !important;
    padding: 0.5rem 1.35rem;
    border-radius: 4px;
    font-size: 0.8rem !important;
    font-weight: 700 !important;
    letter-spacing: 1px !important;
    transition: background 0.2s !important;
  }

  .nav-cta:hover { background: var(--green-mid) !important; }

  /* ── HERO ── */
  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    min-height: 600px;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 80px;
  }

  /* Full-bleed background image placeholder */
  .hero-bg {
    position: absolute;
    inset: 0;
    background: #111; /* ← replace with your image */
    /* background: url('your-hero-image.jpg') center/cover no-repeat; */
    z-index: 0;
  }

  /* Dark gradient overlay so buttons are readable */
  .hero-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.25) 0%,
      rgba(0,0,0,0.15) 40%,
      rgba(0,0,0,0.55) 100%
    );
  }

  /* Image placeholder label */
  .hero-bg-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
    pointer-events: none;
  }

  .hero-bg-label span {
    background: rgba(255,255,255,0.07);
    border: 2px dashed rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.35);
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 1rem 2rem;
    border-radius: 6px;
  }

  /* Buttons row at bottom-center */
  .hero-buttons {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 2rem;
    animation: fadeUp 0.9s 0.3s ease both;
  }

  .btn-apply {
    background: var(--green);
    color: var(--white);
    padding: 1rem 2.75rem;
    border-radius: 5px;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.25s;
    box-shadow: 0 4px 20px rgba(45,106,53,0.5);
  }

  .btn-apply:hover {
    background: var(--green-mid);
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(45,106,53,0.55);
  }

  .btn-learn {
    background: transparent;
    color: var(--white);
    padding: 1rem 2.75rem;
    border-radius: 5px;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    transition: color 0.2s;
    position: relative;
  }

  .btn-learn::after {
    content: '';
    position: absolute;
    bottom: 0.9rem;
    left: 2.75rem;
    right: 2.75rem;
    height: 1px;
    background: rgba(255,255,255,0.5);
    transition: background 0.2s;
  }

  .btn-learn:hover { color: var(--green-light); }
  .btn-learn:hover::after { background: var(--green-light); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    .nav-links { display: none; }
    .nav-signin { display: none; }
    .hero-buttons { flex-direction: column; gap: 1rem; }
    .btn-apply, .btn-learn { padding: 0.85rem 2rem; }
  }
  /* CAROUSEL */
.carousel {
  position: absolute;
  inset: 0;
}

.carousel-slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 1.2s ease;
}

.carousel-slide.active { opacity: 1; }

.carousel-slide img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}

.carousel-dots {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  z-index: 10;
}

.dot {
  width: 10px; height: 10px;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
  cursor: pointer;
  transition: background 0.3s;
}

.dot.active { background: var(--green-light); }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo">
    <!-- Replace src with your actual logo file -->
    <img src="snip.PNG" alt="Newtonian Tuition Centre"
         onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
    <span style="display:none; font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:900; color:var(--black);">
      Newtonian<span style="color:var(--green)">.</span>
    </span>
  </div>

  <ul class="nav-links">
    <li><a href="#discover">Discover</a></li>
    <li><a href="#study">Study</a></li>
    <li><a href="#services">Services</a></li>
    <li><a href="#connect">Connect</a></li>
  </ul>

  <div class="nav-right">
    <a href="#signin" class="nav-links nav-signin" style="text-decoration:none; display:flex; align-items:center;">Sign In</a>
    <a href="#contact" class="nav-links nav-cta" style="text-decoration:none;">Enrol Now!</a>
  </div>
</nav>

<<!-- HERO -->
<section class="hero">

  <!-- CAROUSEL -->
  <div class="hero-bg">
    <div class="carousel">
      <div class="carousel-slide active"><img src="car.avif" alt="Campus 1"></div>
      <div class="carousel-slide"><img src="g.avif" alt="Campus 2"></div>
      <div class="carousel-slide"><img src="car.avif" alt="Campus 3"></div>
      <div class="carousel-slide"><img src="g.avif" alt="Campus 4"></div>
      <div class="carousel-slide"><img src="gg.webp" alt="Campus 5"></div>
    </div>
    <div class="carousel-dots">
      <span class="dot active" onclick="goToSlide(0)"></span>
      <span class="dot" onclick="goToSlide(1)"></span>
      <span class="dot" onclick="goToSlide(2)"></span>
      <span class="dot" onclick="goToSlide(3)"></span>
      <span class="dot" onclick="goToSlide(4)"></span>
    </div>
  </div>

  <!-- CTA Buttons -->
  <div class="hero-buttons">
    <a href="#contact" class="btn-apply">Enrol Now</a>
    <a href="#services" class="btn-learn">Learn More</a>
  </div>

</section>
<script>
  let current = 0;
  const slides = document.querySelectorAll('.carousel-slide');
  const dots = document.querySelectorAll('.dot');

  function goToSlide(n) {
    slides[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = n;
    slides[current].classList.add('active');
    dots[current].classList.add('active');
  }

  setInterval(() => {
    goToSlide((current + 1) % slides.length);
  }, 5000);
</script>
</body>
</html>
